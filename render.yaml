services:
  - type: web
    name: athar
    runtime: python
    region: frankfurt
    plan: free

    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm ci && npm run build

    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
